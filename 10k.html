<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>श्री खिमज - Surprise Gift</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0e27;
}

#poster-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

#poster-bg {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
}

/* ============================================
   GIFT BOX CLICKABLE AREA
   Centered responsive positioning
   ============================================ */
#gift-click-area {
    position: absolute;
    left: 50%;
    top: 58%;
    transform: translate(-50%, -50%);
    width: clamp(180px, 55vw, 380px);
    height: clamp(180px, 30vh, 380px);
    cursor: pointer;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ============================================
   CSS GIFT BOX - RESPONSIVE PREMIUM SIZE
   40-60% bigger than before
   ============================================ */
.gift-box-wrapper {
    position: relative;
    width: clamp(200px, 52vw, 360px);
    height: clamp(200px, 52vw, 360px);
    animation: giftBoxFloat 3s ease-in-out infinite;
}

@keyframes giftBoxFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(1deg); }
}

.gift-box-wrapper::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -40%);
    width: 130%;
    height: 130%;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.25) 0%, rgba(251, 191, 36, 0.05) 50%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 3s ease-in-out infinite;
    z-index: -1;
}

@keyframes glowPulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -40%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -40%) scale(1.15); }
}

.gift-box {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    perspective: 800px;
}

.gift-box-body {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 75%;
    height: 56%;
    background: linear-gradient(135deg, #dc2626 0%, #b91c1c 50%, #991b1b 100%);
    border-radius: clamp(6px, 1.5vw, 12px);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(220, 38, 38, 0.2), inset 0 2px 0 rgba(255, 255, 255, 0.1), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    overflow: hidden;
}

.gift-box-body::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 20%;
    height: 100%;
    background: linear-gradient(90deg, #d97706 0%, #fbbf24 30%, #fcd34d 50%, #fbbf24 70%, #d97706 100%);
    box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.2);
}

.gift-box-body::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    width: 100%;
    height: 26%;
    background: linear-gradient(180deg, #d97706 0%, #fbbf24 30%, #fcd34d 50%, #fbbf24 70%, #d97706 100%);
    box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.2);
}

.gift-lid {
    position: absolute;
    bottom: 54%;
    left: 50%;
    transform: translateX(-50%);
    width: 83%;
    height: 20%;
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 50%, #b91c1c 100%);
    border-radius: clamp(5px, 1.2vw, 10px) clamp(5px, 1.2vw, 10px) clamp(3px, 0.8vw, 6px) clamp(3px, 0.8vw, 6px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.15), inset 0 -1px 0 rgba(0, 0, 0, 0.2);
    z-index: 2;
    transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    transform-origin: bottom center;
}

.gift-lid::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 20%;
    height: 100%;
    background: linear-gradient(90deg, #d97706 0%, #fbbf24 30%, #fcd34d 50%, #fbbf24 70%, #d97706 100%);
}

.gift-bow {
    position: absolute;
    bottom: 72%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
}

.gift-bow::before, .gift-bow::after {
    content: '';
    position: absolute;
    width: clamp(22px, 5.5vw, 42px);
    height: clamp(14px, 3.5vw, 26px);
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
}

.gift-bow::before {
    left: clamp(-18px, -4.5vw, -34px);
    transform: rotate(-25deg);
    border-radius: 50% 50% 50% 10%;
}

.gift-bow::after {
    right: clamp(-18px, -4.5vw, -34px);
    transform: rotate(25deg);
    border-radius: 50% 50% 10% 50%;
}

.gift-bow-center {
    position: absolute;
    bottom: 72%;
    left: 50%;
    transform: translateX(-50%);
    width: clamp(12px, 3vw, 22px);
    height: clamp(12px, 3vw, 22px);
    background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
    border-radius: 50%;
    z-index: 4;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
}

.gift-shadow {
    position: absolute;
    bottom: -8%;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 12%;
    background: radial-gradient(ellipse, rgba(0, 0, 0, 0.4) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowPulse 3s ease-in-out infinite;
}

@keyframes shadowPulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
    50% { transform: translateX(-50%) scale(0.85); opacity: 0.4; }
}

.tap-hint {
    position: absolute;
    bottom: clamp(-55px, -12vw, -40px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    font-weight: 700;
    color: #fbbf24;
    animation: tapPulse 2s ease-in-out infinite;
    text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
    font-family: 'Noto Sans Devanagari', sans-serif;
}

@keyframes tapPulse {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
}

/* ============================================
   ANIMATION CLASSES - EXACTLY SAME
   ============================================ */

.gift-shake {
    animation: giftShake 0.5s ease-in-out !important;
}

@keyframes giftShake {
    0%, 100% { transform: translateY(-15px) rotate(0deg); }
    10% { transform: translateY(-15px) rotate(-8deg); }
    20% { transform: translateY(-15px) rotate(8deg); }
    30% { transform: translateY(-15px) rotate(-6deg); }
    40% { transform: translateY(-15px) rotate(6deg); }
    50% { transform: translateY(-15px) rotate(-4deg); }
    60% { transform: translateY(-15px) rotate(4deg); }
    70% { transform: translateY(-15px) rotate(-2deg); }
    80% { transform: translateY(-15px) rotate(2deg); }
    90% { transform: translateY(-15px) rotate(-1deg); }
}

.lid-open {
    transform: translateX(-50%) translateY(-80px) rotateX(-110deg) !important;
    opacity: 0;
    transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.gift-tear {
    animation: giftTear 0.6s ease-in forwards !important;
}

@keyframes giftTear {
    0% { transform: translateX(-50%) scale(1) rotate(0deg); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.1) rotate(5deg); }
    100% { transform: translateX(-50%) scale(0) rotate(15deg); opacity: 0; }
}

.golden-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, rgba(251, 191, 36, 0.9) 0%, rgba(251, 191, 36, 0.4) 30%, transparent 70%);
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    animation: flashExplode 0.8s ease-out forwards;
}

@keyframes flashExplode {
    0% { opacity: 0; transform: scale(0.5); }
    30% { opacity: 1; transform: scale(1.2); }
    100% { opacity: 0; transform: scale(2); }
}

/* ============================================
   WINNER OVERLAY - LARGER PREMIUM
   ============================================ */
.winner-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 39, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: clamp(12px, 4vw, 32px);
    opacity: 0;
    transition: opacity 0.5s ease;
}

.winner-overlay.active {
    display: flex;
    opacity: 1;
}

.winner-card {
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.05) 100%);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: clamp(20px, 4vw, 36px);
    padding: clamp(24px, 5vw, 48px) clamp(20px, 4vw, 40px);
    max-width: min(92vw, 520px);
    width: 100%;
    text-align: center;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    transform: scale(0.8) translateY(30px);
    opacity: 0;
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.winner-overlay.active .winner-card {
    transform: scale(1) translateY(0);
    opacity: 1;
}

.winner-card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    padding: 1.5px;
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.6) 0%, rgba(255, 255, 255, 0.1) 25%, rgba(251, 191, 36, 0.4) 50%, rgba(255, 255, 255, 0.1) 75%, rgba(251, 191, 36, 0.6) 100%);
    background-size: 300% 300%;
    animation: shimmerBorder 4s linear infinite;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

@keyframes shimmerBorder {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ============================================
   GIFT IMAGE CONTAINER - LARGE & PREMIUM
   85-90% of popup width
   ============================================ */
.winner-card .gift-image-container {
    width: 90%;
    max-width: 420px;
    aspect-ratio: 1 / 1;
    margin: 0 auto clamp(16px, 3vw, 28px);
    border-radius: clamp(14px, 3vw, 24px);
    overflow: hidden;
    background: linear-gradient(145deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.2);
}

.winner-card .gift-image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: clamp(8px, 2vw, 16px);
    transition: transform 0.5s ease;
    animation: imageReveal 0.8s ease-out;
}

@keyframes imageReveal {
    0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
    60% { transform: scale(1.05) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

.winner-card .congrats-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, rgba(251, 191, 36, 0.2) 0%, rgba(251, 191, 36, 0.05) 100%);
    border: 1px solid rgba(251, 191, 36, 0.3);
    padding: clamp(6px, 1.5vw, 10px) clamp(14px, 3vw, 24px);
    border-radius: 50px;
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    font-weight: 700;
    color: #fcd34d;
    margin-bottom: clamp(8px, 2vw, 16px);
    letter-spacing: 0.5px;
}

.winner-card .congrats-title {
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-size: clamp(1.1rem, 3.5vw, 1.6rem);
    font-weight: 800;
    color: #ffffff;
    margin-bottom: clamp(6px, 1.5vw, 12px);
    line-height: 1.3;
}

.winner-card .congrats-subtitle {
    font-size: clamp(0.8rem, 2.2vw, 0.95rem);
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: clamp(16px, 4vw, 32px);
    line-height: 1.5;
    padding: 0 clamp(8px, 2vw, 16px);
}

.winner-card .claim-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: clamp(14px, 3.5vw, 20px) clamp(20px, 4vw, 32px);
    background: linear-gradient(135deg, #d97706 0%, #fbbf24 50%, #fcd34d 100%);
    background-size: 200% 200%;
    animation: gradientShift 3s ease infinite;
    color: #0a0e27;
    border: none;
    border-radius: clamp(12px, 2.5vw, 18px);
    font-size: clamp(0.95rem, 2.8vw, 1.15rem);
    font-weight: 800;
    font-family: 'Noto Sans Devanagari', sans-serif;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(251, 191, 36, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.3);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
}

@keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}

.winner-card .claim-btn:hover,
.winner-card .claim-btn:active {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(251, 191, 36, 0.4);
}

.winner-card .close-btn {
    position: absolute;
    top: clamp(10px, 2.5vw, 18px);
    right: clamp(10px, 2.5vw, 18px);
    width: clamp(32px, 7vw, 44px);
    height: clamp(32px, 7vw, 44px);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.7);
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.winner-card .close-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    color: #ffffff;
    transform: rotate(90deg);
}

/* Loading spinner */
.loader {
    width: clamp(40px, 10vw, 60px);
    height: clamp(40px, 10vw, 60px);
    border: 3px solid rgba(251, 191, 36, 0.2);
    border-top-color: #fbbf24;
    border-radius: 50%;
    animation: loaderSpin 1s linear infinite;
}

@keyframes loaderSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ============================================
   CONFETTI CANVAS
   ============================================ */
#confetti-canvas {
    position: fixed;
    inset: 0;
    z-index: 1500;
    pointer-events: none;
}

/* ============================================
   PARTICLE BURST
   ============================================ */
.particle {
    position: fixed;
    pointer-events: none;
    z-index: 1200;
    border-radius: 50%;
    will-change: transform, opacity;
}

/* Prevent text selection */
body {
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
}

/* ============================================
   LANDSCAPE RESPONSIVE
   ============================================ */
@media (orientation: landscape) and (max-height: 500px) {
    #gift-click-area {
        top: 55%;
        width: clamp(160px, 35vh, 280px);
        height: clamp(160px, 35vh, 280px);
    }
    .gift-box-wrapper {
        width: clamp(160px, 32vh, 260px);
        height: clamp(160px, 32vh, 260px);
    }
    .tap-hint {
        font-size: 0.75rem;
        bottom: -40px;
    }
    .winner-card {
        max-width: min(80vw, 450px);
        padding: 20px;
    }
    .winner-card .gift-image-container {
        width: 70%;
        max-width: 280px;
    }
}

/* ============================================
   VERY SMALL SCREENS
   ============================================ */
@media (max-width: 360px) {
    .gift-box-wrapper {
        width: clamp(170px, 48vw, 200px);
        height: clamp(170px, 48vw, 200px);
    }
    .tap-hint {
        font-size: 0.8rem;
    }
    .winner-card {
        padding: 20px 16px;
    }
}

/* ============================================
   TABLET & DESKTOP
   ============================================ */
@media (min-width: 768px) {
    #gift-click-area {
        width: clamp(280px, 38vw, 400px);
        height: clamp(280px, 38vw, 400px);
    }
    .gift-box-wrapper {
        width: clamp(260px, 35vw, 380px);
        height: clamp(260px, 35vw, 380px);
    }
    .winner-card {
        max-width: 500px;
        padding: 40px;
    }
    .winner-card .gift-image-container {
        max-width: 400px;
    }
}

@media (min-width: 1200px) {
    #gift-click-area {
        width: clamp(320px, 30vw, 450px);
        height: clamp(320px, 30vw, 450px);
    }
    .gift-box-wrapper {
        width: clamp(300px, 28vw, 420px);
        height: clamp(300px, 28vw, 420px);
    }
    .winner-card {
        max-width: 560px;
    }
    .winner-card .gift-image-container {
        max-width: 460px;
    }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
    }
}

::-webkit-scrollbar { width: 0; height: 0; }
body { scrollbar-width: none; }
</style>
</head>
<body>

<div id="poster-container">
    <img id="poster-bg" src="images/background.png" alt="Poster Background" draggable="false">
    
    <!-- Clickable gift box area -->
    <div id="gift-click-area">

            <span>&#128239;</span>WhatsApp पर क्लेम करें

</div>

<canvas id="confetti-canvas"></canvas>

<script>

// Add or remove image links as needed.

const giftImages = [

(function() {
    'use strict';

    const giftClickArea = document.getElementById('gift-click-area');
    const giftBoxWrapper = document.getElementById('giftBoxWrapper');
    const giftBox = document.getElementById('giftBox');
    const giftLid = document.getElementById('giftLid');
    const giftBow = document.getElementById('giftBow');
    const giftBowCenter = document.getElementById('giftBowCenter');
    const giftBoxBody = document.getElementById('giftBoxBody');
    const giftShadow = document.getElementById('giftShadow');
    const tapHint = document.getElementById('tapHint');
    const winnerOverlay = document.getElementById('winnerOverlay');
    const winnerCard = document.getElementById('winnerCard');
    const closeBtn = document.getElementById('closeBtn');
    const giftImage = document.getElementById('giftImage');
    const loader = document.getElementById('loader');
    const confettiCanvas = document.getElementById('confetti-canvas');

    let isAnimating = false;
    let confettiActive = false;
    let confettiCtx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimationId = null;

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() { if (!audioCtx) { audioCtx = new AudioCtx(); } }

    function playGiftOpenSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const frequencies = [523.25, 659.25, 783.99, 1046.50];
        frequencies.forEach(function(freq, i) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i * 0.08);
            gain.gain.setValueAtTime(0.15, now + i * 0.08);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.08);
            osc.stop(now + i * 0.08 + 0.5);
        });
    }

    function playSuccessSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const notes = [
            { freq: 523.25, time: 0, dur: 0.15 },
            { freq: 659.25, time: 0.12, dur: 0.15 },
            { freq: 783.99, time: 0.24, dur: 0.15 },
            { freq: 1046.50, time: 0.36, dur: 0.4 }
        ];
        notes.forEach(function(note) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(note.freq, now + note.time);
            gain.gain.setValueAtTime(0.12, now + note.time);
            gain.gain.exponentialRampToValueAtTime(0.001, now + note.time + note.dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + note.time);
            osc.stop(now + note.time + note.dur);
        });
    }

    function playConfettiSound() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const bufferSize = audioCtx.sampleRate * 0.3;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 3);
        }
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        source.connect(gain);
        gain.connect(audioCtx.destination);
        source.start(now);
    }

    function resizeCanvas() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const confettiColors = ['#fbbf24','#fcd34d','#f59e0b','#ef4444','#f87171','#fca5a5','#3b82f6','#60a5fa','#93c5fd','#10b981','#34d399','#6ee7b7','#8b5cf6','#a78bfa','#c4b5fd','#ec4899','#f472b6','#fbcfe8','#ffffff','#e2e8f0','#cbd5e1'];

    function createConfettiParticle() {
        return {
            x: Math.random() * confettiCanvas.width,
            y: -20,
            w: Math.random() * 8 + 4,
            h: Math.random() * 5 + 3,
            color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
            vx: (Math.random() - 0.5) * 6,
            vy: Math.random() * 3 + 2,
            rotation: Math.random() * 360,
            rotationSpeed: (Math.random() - 0.5) * 10,
            opacity: 1,
            sway: Math.random() * 0.05 + 0.02,
            swayOffset: Math.random() * Math.PI * 2
        };
    }

    function updateConfetti() {
        if (!confettiActive) return;
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        for (let i = confettiParticles.length - 1; i >= 0; i--) {
            const p = confettiParticles[i];
            p.x += p.vx + Math.sin(Date.now() * 0.003 + p.swayOffset) * 2;
            p.y += p.vy;
            p.rotation += p.rotationSpeed;
            p.vy += 0.05;
            p.opacity -= 0.003;
            if (p.opacity <= 0 || p.y > confettiCanvas.height + 20) {
                confettiParticles.splice(i, 1);
                continue;
            }
            confettiCtx.save();
            confettiCtx.translate(p.x, p.y);
            confettiCtx.rotate((p.rotation * Math.PI) / 180);
            confettiCtx.globalAlpha = p.opacity;
            confettiCtx.fillStyle = p.color;
            confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            confettiCtx.restore();
        }
        if (confettiParticles.length > 0) {
            confettiAnimationId = requestAnimationFrame(updateConfetti);
        } else {
            confettiActive = false;
        }
    }

    function startConfetti() {
        confettiActive = true;
        confettiParticles = [];
        for (let i = 0; i < 200; i++) {
            confettiParticles.push(createConfettiParticle());
        }
        updateConfetti();
        let interval = setInterval(function() {
            if (!confettiActive) { clearInterval(interval); return; }
            for (let i = 0; i < 15; i++) {
                confettiParticles.push(createConfettiParticle());
            }
        }, 100);
        setTimeout(function() { clearInterval(interval); }, 6000);
    }

    function createParticleBurst() {
        const rect = giftClickArea.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 8 + 4;
            const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            particle.style.cssText = 'width:' + size + 'px;height:' + size + 'px;background:' + color + ';left:' + centerX + 'px;top:' + centerY + 'px;box-shadow:0 0 10px ' + color + ';';
            document.body.appendChild(particle);
            const angle = (Math.PI * 2 * i) / 30;
            const velocity = Math.random() * 150 + 80;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            particle.animate([
                { transform: 'translate(0,0) scale(1)', opacity: 1 },
                { transform: 'translate(' + vx + 'px,' + vy + 'px) scale(0)', opacity: 0 }
            ], {
                duration: 1000 + Math.random() * 500,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
                fill: 'forwards'
            });
            setTimeout(function() { if (particle.parentNode) particle.parentNode.removeChild(particle); }, 1500);
        }
    }

    function createGoldenFlash() {
        const flash = document.createElement('div');
        flash.className = 'golden-flash';
        document.body.appendChild(flash);
        setTimeout(function() { if (flash.parentNode) flash.parentNode.removeChild(flash); }, 1000);
    }

    function getRandomGiftImage() {
        return giftImages[Math.floor(Math.random() * giftImages.length)];
    }

    function openGift() {
        if (isAnimating) return;
        isAnimating = true;
        initAudio();
        playGiftOpenSound();
        
        // Step 1: Shake
        giftBoxWrapper.classList.add('gift-shake');
        
        setTimeout(function() {
            giftBoxWrapper.classList.remove('gift-shake');
            
            // Step 2: Lid opens
            giftLid.classList.add('lid-open');
            playGiftOpenSound();
            
            setTimeout(function() {
                // Step 3: Golden flash + particles + confetti
                createGoldenFlash();
                createParticleBurst();
                playConfettiSound();
                startConfetti();
                setTimeout(function() { playSuccessSound(); }, 200);
                
                // Step 4: Box tears apart
                giftBoxBody.classList.add('gift-tear');
                giftBow.style.opacity = '0';
                giftBowCenter.style.opacity = '0';
                giftShadow.style.opacity = '0';
                tapHint.style.opacity = '0';
                
                setTimeout(function() {
                    // Step 5: Hide box, show winner
                    giftClickArea.style.opacity = '0';
                    winnerOverlay.style.display = 'flex';
                    winnerOverlay.offsetHeight;
                    winnerOverlay.classList.add('active');
                    
                    const randomImage = getRandomGiftImage();
                    giftImage.src = randomImage;
                    giftImage.onload = function() {
                        loader.style.display = 'none';
                        giftImage.style.display = 'block';
                    };
                    giftImage.onerror = function() {
                        loader.style.display = 'none';
                        giftImage.style.display = 'block';
                        giftImage.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="%23fbbf24" width="200" height="200"/><text fill="%230a0e27" font-size="60" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">&#127873;</text></svg>';
                    };
                    
                    isAnimating = false;
                }, 600);
            }, 800);
        }, 500);
    }

    function closeWinner() {
        winnerOverlay.classList.remove('active');
        setTimeout(function() {
            winnerOverlay.style.display = 'none';
            giftClickArea.style.opacity = '1';
            giftLid.classList.remove('lid-open');
            giftBoxBody.classList.remove('gift-tear');
            giftBow.style.opacity = '1';
            giftBowCenter.style.opacity = '1';
            giftShadow.style.opacity = '1';
            tapHint.style.opacity = '1';
            loader.style.display = 'block';
            giftImage.style.display = 'none';
            giftImage.src = '';
        }, 500);
    }

    // Event listeners
    giftClickArea.addEventListener('click', openGift);
    giftClickArea.addEventListener('touchend', function(e) {
        e.preventDefault();
        openGift();
    });
    closeBtn.addEventListener('click', closeWinner);
    winnerOverlay.addEventListener('click', function(e) {
        if (e.target === winnerOverlay) closeWinner();
    });

    // Preload gift images
    window.addEventListener('load', function() {
        giftImages.forEach(function(src) {
            const img = new Image();
            img.src = src;
        });
    });

})();
</script>

</body>
</html>
