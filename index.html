<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
}
#lottie{
    width:250px;
    height:250px;
}
</style>
</head>
<body>

<div id="lottie"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>

<script>
lottie.loadAnimation({
    container: document.getElementById('lottie'),
    renderer: 'svg',
    loop: true,
    autoplay: true,
    path: 'animation.json'
});

// 3 सेकंड बाद Redirect
setTimeout(function(){
    window.location.href =
    "https://maps.app.goo.gl/QXKM1m89BjHCESd89?g_st=ac";
}, 3000);
</script>

</body>
</html>
